name: autoresearch-task
working_dir: E:\transformerlab-examples\autoresearch
resources:
  accelerators: "A100-80GB:1"
setup: "uv pip install kernels==0.11.7 matplotlib numpy pandas pyarrow requests rustbpe tiktoken torch==2.9.1 transformers huggingface_hub"
run: "python E:/transformerlab-examples/autoresearch/prepare.py --num-shards 10 && python E:/transformerlab-examples/autoresearch/train.py"
envs:
  PYTHONUNBUFFERED: "1"
  HF_HUB_DISABLE_PROGRESS_BARS: "1"
parameters:
  depth: 8
  device_batch_size: 128
  total_batch_size: 524288
  matrix_lr: 0.04
  embedding_lr: 0.6
  unembedding_lr: 0.004
  weight_decay: 0.2
  window_pattern: "SSSL"
