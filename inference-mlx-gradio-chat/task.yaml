name: mlx-gradio-chat
github_repo_url: https://github.com/transformerlab/transformerlab-examples
github_repo_dir: inference-mlx-gradio-chat
resources:
  cpus: 2
  memory: 4
setup: |
  uv pip install gradio openai "mlx-lm>=0.28.3"
  python -c "import gradio; print('gradio installed at:', gradio.__file__)"
  python -c "import mlx_lm; print('mlx_lm installed at:', mlx_lm.__file__)"
run: |
  MODEL_NAME=$MODEL_NAME python ~/inference-mlx-gradio-chat/gradio_chat.py
envs:
  PYTHONUNBUFFERED: "1"
parameters:
  model_name:
    field_name: "Model Name"
    env_var: "MODEL_NAME"
    field_type: "str"
    required: true
    placeholder: "e.g. mlx-community/Llama-3.2-3B-Instruct-4bit"
    help_text: "HuggingFace model identifier (must be an MLX-compatible model, e.g. from mlx-community)"
