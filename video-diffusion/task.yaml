name: video-generation-wan-task
github_repo_url: https://github.com/transformerlab/transformerlab-examples
github_repo_dir: video-diffusion
resources:
  accelerators: "A100:1"
envs:
  PYTHONUNBUFFERED: "1"
  HF_TOKEN: "{{secret._HF_TOKEN}}"
setup: "uv pip install --upgrade pip && uv pip install git+https://github.com/huggingface/diffusers.git && uv pip install 'transformers>=4.41.0' 'peft>=0.17.0' accelerate ftfy huggingface-hub opencv-python transformerlab imageio-ffmpeg"
run: "python ~/video-diffusion/main.py"
parameters:
  model_id: "Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
  prompt: "A cat walks on the grass, realistic"
  negative_prompt: ""
  height: 480
  width: 832
  num_frames: 81
  guidance_scale: 5.0
  output_dir: "./output"
  output_filename: "generated_video.mp4"
  fps: 15
