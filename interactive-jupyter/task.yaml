name: jupyter
github_repo_url: https://github.com/transformerlab/transformerlab-examples
github_repo_dir: interactive-jupyter
resources:
  cpus: 2
  memory: 4
setup: |
  pip install jupyter
run: |
  python ~/interactive-jupyter/run.py
envs:
  PYTHONUNBUFFERED: "1"
parameters:
  ngrok_auth_token:
    field_name: "ngrok Auth Token"
    env_var: "NGROK_AUTH_TOKEN"
    field_type: "str"
    required: true
    placeholder: "ngrok_..."
    help_text: "Your ngrok authentication token. You can get your token from https://dashboard.ngrok.com/get-started/your-authtoken."
    password: true
